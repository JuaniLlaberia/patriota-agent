# Hermes Agent configuration for the El Patriota deployment.
# Lives at ~/.hermes/config.yaml (mounted from ./hermes).
# Prefer `hermes config set <key> <value>` over hand-editing where possible.

# ── Model ──────────────────────────────────────────────────────────────────────
# Provider/model in Hermes' "provider/model" form. Claude is the orchestrator.
# Opus for drafting quality; routine monitoring cron ticks override to a cheaper
# model per-job (see hermes/cron/seed-jobs.md). Confirm the exact model string
# Hermes expects with `hermes config set model anthropic/<model>`.
model: anthropic/claude-opus-4-8

terminal:
  backend: local

# ── Custom tools (patriota-tools MCP server, stdio) ────────────────────────────
# Tools surface to the agent as mcp_patriota_<tool> (e.g. mcp_patriota_ingest_all).
mcp_servers:
  patriota:
    command: patriota-tools          # console_script from pyproject (installed in image)
    args: []
    env:
      USE_MOCKS: "true"              # flip to "false" in Phase F
      PATRIOTA_DB_PATH: "/data/patriota.db"
      PATRIOTA_WOEID: "455827"
      # Real-service vars are read from the environment when USE_MOCKS=false:
      # TWITTERAPI_IO_KEY, CMS_BASE_URL, CMS_API_TOKEN

# ── Cron ───────────────────────────────────────────────────────────────────────
cron:
  wrap_response: false
  script_timeout_seconds: 300

# ── Persona / operating rules ──────────────────────────────────────────────────
# Persistent persona + house rules live in hermes/AGENTS.md, loaded when the
# agent runs with this directory as its workdir (cron jobs set --workdir /app
# or the project dir). Keep the editorial voice and guardrails there.
