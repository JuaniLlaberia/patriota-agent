# Hermes Agent configuration for the El Patriota deployment.
# Copied to ~/.hermes/config.yaml by deploy/install.sh.
# The mcp_servers section below is managed at runtime by `patriota-install-mcp`
# (run automatically by start-gateway.sh on each start); hand-edits to that
# section will be overwritten. All other keys are preserved across restarts.
# Prefer `hermes config set <key> <value>` over hand-editing where possible.

# ── Model ──────────────────────────────────────────────────────────────────────
# Provider/model in Hermes' "provider/model" form. Claude is the orchestrator.
# Opus for drafting quality; routine monitoring cron ticks override to a cheaper
# model per-job (see hermes/cron/seed-jobs.md). Confirm the exact model string
# Hermes expects with `hermes config set model anthropic/<model>`.
model: openai/gpt-4o-mini

generation:
  temperature: 0.1

agent:
  tool_use_enforcement: true   # force structured tool calls on GPT models (not needed for Anthropic)

terminal:
  backend: local

# ── Custom tools (patriota-tools MCP server, stdio) ────────────────────────────
# Tools surface to the agent as mcp_patriota_<tool> (e.g. mcp_patriota_ingest_all).
mcp_servers:
  patriota:
    # ↓ overwritten by patriota-install-mcp on every gateway start — edit /etc/patriota/env instead
    command: /opt/patriota/venv/bin/patriota-tools
    args: []
    env:
      USE_MOCKS: "false"
      PATRIOTA_DB_PATH: "/home/patriota/.hermes/patriota.db"
      PATRIOTA_WOEID: "455827"
      # TWITTERAPI_IO_KEY, CMS_BASE_URL, CMS_API_TOKEN injected from /etc/patriota/env

# ── Cron ───────────────────────────────────────────────────────────────────────
cron:
  wrap_response: false
  script_timeout_seconds: 300

# ── Persona / operating rules ──────────────────────────────────────────────────
# Persistent persona + house rules live in hermes/AGENTS.md, copied to
# ~/.hermes/AGENTS.md by deploy/install.sh. Cron jobs use --workdir ~/.hermes
# so Hermes auto-injects it. Keep the editorial voice and guardrails there.
